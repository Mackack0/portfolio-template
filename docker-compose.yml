services:
  # FRONTEND (El HTML)
  personal-portfolio:
    image: nginx:alpine
    container_name: personal-portfolio
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8081:80"
    networks:
      - npm_default

  # BACKEND (Python)
  portfolio-backend:
    build: ./backend
    container_name: portfolio-backend
    env_file: ./backend/.env
    volumes:
      - ./data:/home/TU_USUARIO/portfolio/data
      - ./html/img:/app/public_images
    networks:
      - npm_default
    # Sin ports, NPM llegará por la red interna

  # EL RECEPCIONISTA (NPM)
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    ports:
      - '80:80'
      - '81:81'
      - '8080:80'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - npm_default

  # TAILWIND BUILDER (CSS Compilation)
  tailwind-builder:
    build:
      context: .
      dockerfile: Dockerfile.tailwind
    container_name: tailwind-builder
    volumes:
      - ./src:/app/src
      - ./html:/app/html
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./postcss.config.js:/app/postcss.config.js
    networks:
      - npm_default
    # Runs in watch mode, rebuilds CSS on file changes


networks:
  npm_default:
    external: true
